name: build-flatpak-multiarch  
  
on:  
  push:  
    branches: [ "master" ]  
  pull_request:  
    branches: [ "master" ]  
  
jobs:  
  build:  
    runs-on: debian-latest  
    strategy:  
      matrix:  
        arch: [x86_64, aarch64]  
    steps:  
    - uses: actions/checkout@v3  
  
    - name: Install Flatpak  
      run: |  
        sudo apt-get update  
        sudo apt-get install -y flatpak flatpak-builder  
  
    - name: Add Flathub remote  
      run: sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo  
  
    - name: Install KDE Platform and SDK  
      run: |  
        sudo flatpak install -y --arch=${{ matrix.arch }} flathub org.kde.Platform//6.8  
        sudo flatpak install -y --arch=${{ matrix.arch }} flathub org.kde.Sdk//6.8  
  
    - name: Build Flatpak  
      run: |  
        sudo flatpak-builder --arch=${{ matrix.arch }} --repo=repo --force-clean build-dir de.darc.dm3mat.qdmr.yaml
